<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222" />
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill:#111; }
      .sub { font: 400 17px sans-serif; fill:#555; }
      .label { font: 600 18px sans-serif; fill:#111; }
      .small { font: 400 15px sans-serif; fill:#333; }
      .line { stroke:#222; stroke-width:5; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .box { fill:#f5f5f5; stroke:#222; stroke-width:2; rx:18; }
      .hot { fill:#ffe8e0; stroke:#8a3a1f; stroke-width:2; rx:18; }
      .cool { fill:#eaf3ff; stroke:#244a7a; stroke-width:2; rx:18; }
      .bad { fill:#ffd6d6; stroke:#9a1c1c; stroke-width:2; rx:18; }
      .ok { fill:#e8f6e8; stroke:#286c2c; stroke-width:2; rx:18; }
    </style>
  </defs>
  <rect width="1100" height="650" fill="#ffffff"/>
  <text x="40" y="55" class="title">Turbina: zonas conceituais de energia</text>
  <text x="40" y="85" class="sub">Laranja = energia útil; vermelho = perda provável; azul = saída pós-expansão.</text>
<rect x="70" y="160" width="280" height="130" class="hot"/>
<text x="105" y="210" class="label">Entrada quente</text>
<text x="105" y="238" class="small">Alta pressão + alta temperatura</text>
<path d="M350 225 C500 180, 610 185, 720 260" class="line"/>
<ellipse cx="760" cy="310" rx="125" ry="125" fill="#f3f3f3" stroke="#222" stroke-width="4"/>
<circle cx="760" cy="310" r="65" fill="#fff" stroke="#222" stroke-width="3"/>
<text x="705" y="315" class="label">Rotor</text>
<path d="M885 310 C950 315, 990 320, 1030 325" class="line"/>
<rect x="915" y="375" width="140" height="75" class="cool"/>
<text x="940" y="420" class="small">Saída</text>
<path d="M485 370 C560 435, 680 465, 770 435" class="thin"/>
<text x="365" y="405" class="small">Recirculação provável se a voluta/entrada for ruim</text>
</svg>