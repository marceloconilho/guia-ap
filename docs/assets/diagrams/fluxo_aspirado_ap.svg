<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222" />
    </marker>
    <style>
      .title { font: 700 28px sans-serif; fill:#111; }
      .sub { font: 400 16px sans-serif; fill:#555; }
      .label { font: 600 16px sans-serif; fill:#111; }
      .small { font: 400 14px sans-serif; fill:#333; }
      .tiny { font: 400 12px sans-serif; fill:#666; }
      .line { stroke:#222; stroke-width:4; fill:none; marker-end:url(#arrow); }
      .box { fill:#f5f5f5; stroke:#222; stroke-width:2; rx:14; }
      .intake { fill:#eaf3ff; stroke:#244a7a; stroke-width:2; rx:14; }
      .engine { fill:#fff8e8; stroke:#8a6a1f; stroke-width:2; rx:14; }
      .exhaust { fill:#ffe8e0; stroke:#8a3a1f; stroke-width:2; rx:14; }
      .loss { fill:#ffd6d6; stroke:#9a1c1c; stroke-width:2; rx:10; }
      .note { fill:#e8f6e8; stroke:#286c2c; stroke-width:2; rx:10; }
    </style>
  </defs>
  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="40" y="45" class="title">Fluxo aspirado AP  diagrama conceitual</text>
  <text x="40" y="72" class="sub">CFD simplificado: mostra depressăo na admissăo e backpressure no escape. Năo é simulaçăo numérica.</text>

  <rect x="40" y="130" width="120" height="70" class="intake"/>
  <text x="62" y="172" class="label">Filtro</text>

  <rect x="190" y="130" width="120" height="70" class="intake"/>
  <text x="205" y="172" class="label">Borboleta</text>

  <rect x="340" y="130" width="120" height="70" class="intake"/>
  <text x="365" y="172" class="label">Coletor</text>

  <rect x="490" y="110" width="150" height="110" class="engine"/>
  <text x="525" y="155" class="label">Cabeçote</text>
  <text x="515" y="178" class="tiny">+ cilindros</text>

  <rect x="670" y="130" width="120" height="70" class="exhaust"/>
  <text x="685" y="172" class="label">Coletor</text>
  <text x="688" y="188" class="tiny">escape</text>

  <rect x="820" y="130" width="120" height="70" class="exhaust"/>
  <text x="845" y="172" class="label">Escape</text>

  <path d="M160 165 L190 165" class="line"/>
  <path d="M310 165 L340 165" class="line"/>
  <path d="M460 165 L490 165" class="line"/>
  <path d="M640 165 L670 165" class="line"/>
  <path d="M790 165 L820 165" class="line"/>

  <text x="210" y="115" class="small">Depressăo puxa ar</text>
  <text x="700" y="115" class="small">Gases empurram contra</text>

  <rect x="180" y="260" width="170" height="55" class="loss"/>
  <text x="195" y="292" class="small">Gargalo típico: TB / curva</text>

  <rect x="480" y="260" width="170" height="55" class="loss"/>
  <text x="500" y="292" class="small">EV limitada: tempo + fluxo</text>

  <rect x="780" y="260" width="170" height="55" class="loss"/>
  <text x="795" y="292" class="small">Backpressure no escape</text>

  <rect x="40" y="360" width="1020" height="90" class="note"/>
  <text x="60" y="395" class="label">Como ler este desenho</text>
  <text x="60" y="420" class="small">1. O ar entra por depressăo  turbo ainda năo existe.</text>
  <text x="60" y="442" class="small">2. Caixas vermelhas = onde o motor paga imposto de fluxo.</text>
  <text x="560" y="420" class="small">3. Melhorar aspirado = reduzir perdas e alinhar comando/acerto.</text>
  <text x="560" y="442" class="small">4. Turbo futuro amplifica o que já está aqui.</text>

  <text x="40" y="520" class="tiny">Ordem de explosăo AP: 1-3-4-2 | Pressăo atmosférica na admissăo | Sem intercooler neste caminho</text>
</svg>
