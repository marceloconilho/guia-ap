<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222" />
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill:#111; }
      .sub { font: 400 17px sans-serif; fill:#555; }
      .label { font: 600 18px sans-serif; fill:#111; }
      .small { font: 400 15px sans-serif; fill:#333; }
      .line { stroke:#222; stroke-width:5; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .box { fill:#f5f5f5; stroke:#222; stroke-width:2; rx:18; }
      .hot { fill:#ffe8e0; stroke:#8a3a1f; stroke-width:2; rx:18; }
      .cool { fill:#eaf3ff; stroke:#244a7a; stroke-width:2; rx:18; }
      .bad { fill:#ffd6d6; stroke:#9a1c1c; stroke-width:2; rx:18; }
      .ok { fill:#e8f6e8; stroke:#286c2c; stroke-width:2; rx:18; }
    </style>
  </defs>
  <rect width="1100" height="650" fill="#ffffff"/>
  <text x="40" y="55" class="title">Sistema turbo como máquina de energia</text>
  <text x="40" y="85" class="sub">O turbo não é uma peça isolada: ele conversa com o motor inteiro.</text>
<rect x="80" y="180" width="190" height="100" class="box"/><text x="120" y="238" class="label">Cilindro</text>
<rect x="360" y="180" width="190" height="100" class="hot"/><text x="395" y="238" class="label">Escape</text>
<rect x="640" y="180" width="190" height="100" class="hot"/><text x="685" y="238" class="label">Turbina</text>
<rect x="640" y="390" width="190" height="100" class="cool"/><text x="675" y="448" class="label">Compressor</text>
<rect x="360" y="390" width="190" height="100" class="cool"/><text x="392" y="448" class="label">Intercooler</text>
<rect x="80" y="390" width="190" height="100" class="cool"/><text x="122" y="448" class="label">Admissão</text>
<path d="M270 230 L360 230" class="line"/><path d="M550 230 L640 230" class="line"/>
<path d="M735 280 L735 390" class="line"/><path d="M640 440 L550 440" class="line"/><path d="M360 440 L270 440" class="line"/>
<path d="M175 390 L175 280" class="line"/>
<text x="330" y="120" class="small">Energia térmica + pressão + velocidade</text>
<text x="360" y="565" class="small">Densidade de ar + temperatura controlada + combustão segura</text>
</svg>