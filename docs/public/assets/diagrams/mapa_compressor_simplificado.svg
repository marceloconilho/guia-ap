<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#222" />
    </marker>
    <style>
      .title { font: 700 30px sans-serif; fill:#111; }
      .sub { font: 400 17px sans-serif; fill:#555; }
      .label { font: 600 18px sans-serif; fill:#111; }
      .small { font: 400 15px sans-serif; fill:#333; }
      .line { stroke:#222; stroke-width:5; fill:none; marker-end:url(#arrow); }
      .thin { stroke:#555; stroke-width:2; fill:none; marker-end:url(#arrow); }
      .box { fill:#f5f5f5; stroke:#222; stroke-width:2; rx:18; }
      .hot { fill:#ffe8e0; stroke:#8a3a1f; stroke-width:2; rx:18; }
      .cool { fill:#eaf3ff; stroke:#244a7a; stroke-width:2; rx:18; }
      .bad { fill:#ffd6d6; stroke:#9a1c1c; stroke-width:2; rx:18; }
      .ok { fill:#e8f6e8; stroke:#286c2c; stroke-width:2; rx:18; }
    </style>
  </defs>
  <rect width="1100" height="650" fill="#ffffff"/>
  <text x="40" y="55" class="title">Mapa de compressor: leitura guiada</text>
  <text x="40" y="85" class="sub">Este desenho é didático. Os mapas reais estão linkados no apêndice.</text>
<line x1="120" y1="520" x2="960" y2="520" stroke="#222" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="120" y1="520" x2="120" y2="125" stroke="#222" stroke-width="3" marker-end="url(#arrow)"/>
<text x="400" y="575" class="label">Fluxo de ar (lb/min)</text>
<text x="35" y="335" transform="rotate(-90 35 335)" class="label">Pressure ratio</text>
<path d="M235 480 C205 390, 220 280, 295 195" stroke="#9a1c1c" stroke-width="5" fill="none"/>
<text x="190" y="170" class="small">Surge line</text>
<path d="M245 430 C420 275, 690 210, 880 350 C910 430, 860 500, 730 505 C515 510, 330 490, 245 430Z" fill="#e8f6e8" stroke="#286c2c" stroke-width="3"/>
<ellipse cx="600" cy="365" rx="180" ry="95" fill="none" stroke="#244a7a" stroke-width="4"/>
<ellipse cx="610" cy="365" rx="100" ry="52" fill="none" stroke="#244a7a" stroke-width="3"/>
<text x="520" y="365" class="small">ilhas de eficiência</text>
<path d="M870 175 C940 285, 945 430, 885 520" stroke="#9a1c1c" stroke-width="5" fill="none"/>
<text x="875" y="155" class="small">Choke</text>
<circle cx="500" cy="360" r="10" fill="#111"/>
<text x="520" y="350" class="small">ponto de operação bom</text>
<circle cx="300" cy="430" r="10" fill="#111"/>
<text x="320" y="455" class="small">risco de surge</text>
</svg>